server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets can be cached; keep index.html fresh so updates land.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location ~* \.(css|js)$ {
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
