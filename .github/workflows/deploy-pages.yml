name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The app is plain static HTML/CSS/JS, so the site is the repo tree
      # itself. Publishing it to a branch named gh-pages makes GitHub enable
      # Pages for that branch automatically — no Settings changes and no
      # Pages API calls (which the default workflow token isn't allowed to
      # make) are needed.
      - name: Publish to gh-pages branch
        run: git push --force origin HEAD:gh-pages
